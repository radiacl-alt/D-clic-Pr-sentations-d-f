<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Déclic · Slide Studio</title>
<script src="pptxgen.bundle.js"></script>
<style>
:root{--navy:#1A2E4A;--teal:#0891B2;--teal-light:#E0F2FE;--accent:#06B6D4;--white:#FFFFFF;--off-white:#F8FAFC;--border:#E2E8F0;--text:#1A2E4A;--muted:#64748B;--error:#EF4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--off-white);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--navy);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--accent);flex-shrink:0}
.logo{color:white;font-weight:700;font-size:15px}.logo em{color:var(--accent);font-style:normal}
.header-sub{color:rgba(255,255,255,0.45);font-size:11px}
.app{display:flex;flex:1;overflow:hidden}
.sidebar{width:240px;background:white;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.btn-add{background:var(--teal);color:white;border:none;border-radius:6px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer}
.btn-add:hover{background:var(--navy)}
.slides-list{flex:1;overflow-y:auto;padding:6px}
.slide-item{padding:9px 10px;border-radius:7px;cursor:pointer;margin-bottom:3px;border:1.5px solid transparent;display:flex;align-items:center;gap:8px;transition:all .12s}
.slide-item:hover{background:var(--off-white)}.slide-item.active{background:var(--teal-light);border-color:var(--teal)}
.snum{width:20px;height:20px;background:var(--border);border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}
.slide-item.active .snum{background:var(--teal);color:white}
.sinfo{flex:1;min-width:0}.stype{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.stitle{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sdel{background:none;border:none;cursor:pointer;color:#CBD5E1;font-size:13px;padding:2px 4px;border-radius:3px}
.sdel:hover{color:var(--error)}
.sidebar-foot{padding:10px;border-top:1px solid var(--border)}
.btn-gen-all{width:100%;background:var(--navy);color:white;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px;font-family:inherit}
.btn-gen-all:hover{background:var(--teal)}.btn-gen-all:disabled{opacity:.4;cursor:not-allowed}
.scount{font-size:11px;color:var(--muted);text-align:center}
.editor{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);text-align:center}
.empty-icon{font-size:44px;opacity:.25}.empty h3{font-size:15px}.empty p{font-size:12px;max-width:220px;line-height:1.6}
.card{background:white;border-radius:10px;border:1px solid var(--border);overflow:hidden}
.card-head{background:var(--navy);padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
.card-head-title{color:white;font-size:13px;font-weight:600}
.badge{background:var(--accent);color:white;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
.card-body{padding:18px;display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.field input,.field textarea{border:1.5px solid var(--border);border-radius:7px;padding:9px 11px;font-size:13px;font-family:inherit;color:var(--text);background:var(--off-white);resize:vertical;transition:border-color .12s}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--teal);background:white}
.field textarea{min-height:120px;line-height:1.6}
.hint{font-size:11px;color:var(--muted);line-height:1.5}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.tbtn{border:1.5px solid var(--border);background:var(--off-white);border-radius:7px;padding:9px 4px;cursor:pointer;text-align:center;transition:all .12s;font-family:inherit}
.tbtn:hover,.tbtn.sel{border-color:var(--teal);background:var(--teal-light)}
.tbtn-icon{font-size:18px;display:block;margin-bottom:3px}
.tbtn-label{font-size:9px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.3px}
.gen-row{background:white;border-radius:10px;border:1px solid var(--border);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.gen-info h3{font-size:13px;font-weight:600;margin-bottom:3px}.gen-info p{font-size:11px;color:var(--muted)}
.btn-gen{background:var(--teal);color:white;border:none;border-radius:7px;padding:10px 16px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
.btn-gen:hover{background:var(--navy)}.btn-gen:disabled{opacity:.4;cursor:not-allowed}
.status{padding:9px 14px;border-radius:7px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px}
.status.info{background:var(--teal-light);color:var(--teal)}.status.ok{background:#D1FAE5;color:#065F46}.status.err{background:#FEE2E2;color:#991B1B}
.spin{width:13px;height:13px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{height:1px;background:var(--border)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div class="header">
  <div class="logo">Déclic <em>·</em> Slide Studio</div>
  <div class="header-sub">Générateur de présentations PowerPoint</div>
</div>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-label">Slides</span>
      <button class="btn-add" onclick="addSlide()">+ Ajouter</button>
    </div>
    <div class="slides-list" id="slidesList"></div>
    <div class="sidebar-foot">
      <button class="btn-gen-all" id="btnAll" onclick="generateAll()" disabled>⬇ Générer tout le deck</button>
      <div class="scount" id="scount">0 slide</div>
    </div>
  </div>
  <div class="editor" id="editor">
    <div class="empty">
      <div class="empty-icon">🎨</div>
      <h3>Bienvenue dans Slide Studio</h3>
      <p>Cliquez sur <strong>+ Ajouter</strong> pour créer votre première slide.</p>
    </div>
  </div>
</div>
<script>
const TYPES=[
  {id:"titre",icon:"🎯",label:"Titre",hint:"Titre principal, sous-titre, contexte"},
  {id:"transition",icon:"🔷",label:"Section",hint:"Slide de transition entre parties"},
  {id:"liste",icon:"📋",label:"Liste",hint:"Piliers, points clés avec icones"},
  {id:"etapes",icon:"➡️",label:"Etapes",hint:"Processus numerote ou timeline"},
  {id:"chiffres",icon:"📊",label:"Chiffres",hint:"KPIs et statistiques cles"},
  {id:"texte",icon:"📝",label:"Texte",hint:"Contenu textuel structure"},
];
const PH={
  titre:"Titre de la presentation\nSous-titre ou accroche\nNom du projet / client",
  transition:"Titre de la section\nSous-titre ou numero de partie",
  liste:"Un item par ligne :\nEngagement Direction : Sans impulsion du top management...\nGouvernance : Des instances de pilotage...",
  etapes:"Une etape par ligne :\nEtape 1 - Diagnostic : Analyse situation actuelle\nEtape 2 - Strategie : Definition des priorites",
  chiffres:"Format : VALEUR | Libelle | Description\n87% | Satisfaction client | Enquete 2024\n12M EUR | Chiffre affaires | +15% vs 2023",
  texte:"Collez votre texte. Claude le structure visuellement.",
};
let slides=[],currentId=null,busy=false;

function addSlide(){save();const s={id:Date.now(),type:"liste",title:"",subtitle:"",content:""};slides.push(s);currentId=s.id;render();}
function del(id,e){e.stopPropagation();slides=slides.filter(s=>s.id!==id);if(currentId===id)currentId=slides.length?slides[slides.length-1].id:null;render();}
function pick(id){save();currentId=id;render();}
function setType(t){const s=slides.find(x=>x.id===currentId);if(s){s.type=t;render();}}
function save(){const s=slides.find(x=>x.id===currentId);if(!s)return;const t=document.getElementById("ft"),c=document.getElementById("fc"),sub=document.getElementById("fsub");if(t)s.title=t.value;if(c)s.content=c.value;if(sub)s.subtitle=sub.value;}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function renderSidebar(){
  const names={titre:"Titre",transition:"Section",liste:"Liste",etapes:"Etapes",chiffres:"Chiffres",texte:"Texte"};
  document.getElementById("slidesList").innerHTML=slides.map((s,i)=>`
    <div class="slide-item ${s.id===currentId?"active":""}" onclick="pick(${s.id})">
      <div class="snum">${i+1}</div>
      <div class="sinfo"><div class="stype">${names[s.type]||s.type}</div><div class="stitle">${s.title||"(sans titre)"}</div></div>
      <button class="sdel" onclick="del(${s.id},event)">x</button>
    </div>`).join("");
  document.getElementById("scount").textContent=slides.length+" slide"+(slides.length>1?"s":"");
  document.getElementById("btnAll").disabled=!slides.length||busy;
}

function renderEditor(){
  const ed=document.getElementById("editor");
  const s=slides.find(x=>x.id===currentId);
  if(!s){ed.innerHTML=`<div class="empty"><div class="empty-icon">🎨</div><h3>Commencez votre deck</h3><p>Cliquez sur <strong>+ Ajouter</strong> pour créer votre première slide.</p></div>`;return;}
  const idx=slides.indexOf(s)+1;
  const ti=TYPES.find(t=>t.id===s.type);
  ed.innerHTML=`
    <div class="card">
      <div class="card-head"><span class="card-head-title">Slide ${idx}</span><span class="badge">${ti?ti.label:s.type}</span></div>
      <div class="card-body">
        <div class="field"><label>Type de slide</label>
          <div class="type-grid">${TYPES.map(t=>`<button class="tbtn ${s.type===t.id?"sel":""}" onclick="setType('${t.id}')"><span class="tbtn-icon">${t.icon}</span><span class="tbtn-label">${t.label}</span></button>`).join("")}</div>
        </div>
        <div class="divider"></div>
        <div class="field"><label>Titre</label><input id="ft" type="text" placeholder="Titre de la slide" value="${esc(s.title)}" oninput="autosave()"></div>
        ${s.type==="titre"?`<div class="field"><label>Sous-titre</label><input id="fsub" type="text" placeholder="Sous-titre ou accroche" value="${esc(s.subtitle||"")}" oninput="autosave()"></div>`:""}
        <div class="field"><label>Contenu</label><textarea id="fc" placeholder="${PH[s.type]||""}" oninput="autosave()">${esc(s.content)}</textarea><div class="hint">💡 ${ti?ti.hint:""}</div></div>
      </div>
    </div>
    <div class="gen-row">
      <div class="gen-info"><h3>Générer cette slide</h3><p>Claude met en page et télécharge le fichier .pptx</p></div>
      <button class="btn-gen" id="btnOne" onclick="genOne()">⬇ Générer cette slide</button>
    </div>
    <div id="statusArea"></div>`;
}

function render(){renderSidebar();renderEditor();}
let saveTimer;
function autosave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>{save();renderSidebar();},300);}
function setStatus(type,msg){const a=document.getElementById("statusArea");if(!a)return;a.innerHTML=`<div class="status ${type}">${type==="info"?"<div class=\"spin\"></div>":""}<span>${msg}</span></div>`;}

async function genOne(){
  save();
  const s=slides.find(x=>x.id===currentId);
  if(!s)return;
  document.getElementById("btnOne").disabled=true;
  setStatus("info","Claude génère votre slide...");
  try{
    const code=await askClaude([s]);
    await execPptx(code,"slide_"+s.type+".pptx");
    setStatus("ok","Slide générée et téléchargée !");
  }catch(e){setStatus("err","Erreur : "+e.message);}
  finally{const b=document.getElementById("btnOne");if(b)b.disabled=false;}
}

async function generateAll(){
  save();if(!slides.length)return;
  busy=true;render();
  document.getElementById("btnAll").textContent="Génération...";
  const ed=document.getElementById("editor");
  ed.innerHTML=`<div class="empty"><div class="spin" style="width:36px;height:36px;border-width:3px;color:var(--teal)"></div><h3>Génération du deck...</h3><p>Claude met en page vos ${slides.length} slides.</p></div>`;
  try{
    const code=await askClaude(slides);
    await execPptx(code,"deck_complet.pptx");
    ed.innerHTML=`<div class="empty"><div class="empty-icon">✅</div><h3>Deck généré !</h3><p>Votre fichier .pptx a été téléchargé.</p></div>`;
  }catch(e){ed.innerHTML=`<div class="empty"><div class="empty-icon">❌</div><h3>Erreur</h3><p>${e.message}</p></div>`;}
  finally{busy=false;document.getElementById("btnAll").textContent="⬇ Générer tout le deck";renderSidebar();}
}

async function askClaude(slidesData){
  const prompt="Tu es un expert PowerPoint. Genere du code PptxGenJS valide.\n\nCHARTE (SANS # devant hex) :\nNavy: 1A2E4A | Teal: 0891B2 | Teal-light: E0F2FE | Accent: 06B6D4\nWhite: FFFFFF | Off-white: F8FAFC | Body: 374151 | Border: E2E8F0\nPolice: Calibri | Layout: LAYOUT_16x9 (10x5.625 pouces)\n\nREGLES ABSOLUES :\n- JAMAIS de # devant les couleurs hex\n- JAMAIS shadow avec couleur 8 caracteres, utiliser opacity separe\n- JAMAIS apostrophe simple dans les textes addText - utiliser \\u2019 ou remplacer par virgule\n- TOUJOURS breakLine:true entre items sauf le dernier\n- Chaque shadow = objet NEUF\n- Marges min 0.5 pouce\n- Tous les strings de texte en DOUBLE GUILLEMETS uniquement\n\nLAYOUTS :\ntitre: fond navy, titre blanc 38pt bold centre, sous-titre teal-light 16pt, barre accent 0.25 en bas\ntransition: fond navy, titre blanc 32pt bold centre vertical\nliste: header navy 1 pouce, grille cartes blanches ombre legere, barre teal 0.07 en tete de chaque carte, titre bold, corps 10pt. Max 8 items.\netapes: header navy, cercles numerotes navy connectes par ligne teal\nchiffres: header navy, 2-4 grandes cartes, grand chiffre 50pt teal bold, libelle 13pt navy\ntexte: header navy, contenu structure hierarchie visuelle\n\nSLIDES A GENERER :\n"+slidesData.map((s,i)=>"Slide "+(i+1)+" | Type: "+s.type+" | Titre: "+(s.title||"vide")+(s.subtitle?" | Sous-titre: "+s.subtitle:"")+" | Contenu: "+(s.content||"exemple realiste")).join("\n")+"\n\nCODE :\n- Commence par: const pres = new PptxGenJS();\n- pres.layout = \"LAYOUT_16x9\";\n- Termine par: pres.writeFile({fileName: \"deck.pptx\"}).then(function(){});\n- UNIQUEMENT code JavaScript pur, ZERO markdown, ZERO commentaire, ZERO explication";

  const r=await fetch("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,messages:[{role:"user",content:prompt}]})});
  if(!r.ok)throw new Error("Erreur API "+r.status);
  const d=await r.json();
  if(d.error)throw new Error(d.error);
  let code=d.content.filter(b=>b.type==="text").map(b=>b.text).join("");
  code=code.replace(/```javascript\n?/g,"").replace(/```js\n?/g,"").replace(/```\n?/g,"").trim();
  return code;
}

async function execPptx(code,filename){
  const patched=code
    .replace(/const pptxgen\s*=\s*require\([^)]+\);?/gi,"")
    .replace(/const pres\s*=\s*new pptxgen\(\)/gi,"const pres = new PptxGenJS()")
    .replace(/new pptxgen\(\)/gi,"new PptxGenJS()")
    .replace(/pres\.writeFile\(\{fileName:[^}]+\}\)/g,"pres.writeFile({fileName:\""+filename+"\"})");
  try{
    const fn=new Function("PptxGenJS",patched+"\nreturn pres;");
    const pres=fn(PptxGenJS);
    await pres.writeFile({fileName:filename});
  }catch(e){throw new Error("Erreur PPTX : "+e.message);}
}

render();
</script>
</body>
</html>
